<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptobey Ticker — Live Crypto Prices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d0c;
    --panel: #121613;
    --line: #1f2620;
    --text: #e8ede9;
    --dim: #6f7d74;
    --up: #3ddc84;
    --down: #ff5c5c;
    --amber: #e8b339;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  /* --- Ticker tape signature element --- */
  .tape-wrap {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    overflow: hidden;
    white-space: nowrap;
    padding: 10px 0;
  }
  .tape {
    display: inline-block;
    animation: scroll 30s linear infinite;
  }
  .tape span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-right: 36px;
    color: var(--dim);
    letter-spacing: 0.02em;
  }
  .tape span b { color: var(--text); font-weight: 500; }
  .tape span.up { color: var(--up); }
  .tape span.down { color: var(--down); }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  header {
    max-width: 1000px;
    margin: 0 auto;
    padding: 48px 24px 32px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--amber);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  h1 {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  header p {
    color: var(--dim);
    margin-top: 12px;
    font-size: 15px;
    max-width: 520px;
  }

  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .toolbar input {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 220px;
    outline: none;
  }
  .toolbar input:focus { border-color: var(--amber); }
  .updated {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--dim);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    text-align: left;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dim);
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
  }
  thead th.num { text-align: right; }
  tbody td {
    padding: 16px 14px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  tbody td.num {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
  }
  tbody tr:hover { background: var(--panel); }

  .coin-name { display: flex; align-items: center; gap: 10px; }
  .coin-name img { width: 24px; height: 24px; border-radius: 50%; }
  .coin-symbol { color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 12px; text-transform: uppercase; }

  .up { color: var(--up); }
  .down { color: var(--down); }

  .loading, .error {
    padding: 60px 0;
    text-align: center;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  footer {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 640px) {
    .coin-symbol, thead th:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<div class="tape-wrap">
  <div class="tape mono" id="tape"></div>
</div>

<header>
  <div class="eyebrow">Cryptobey / Live Board</div>
  <h1>The ticker doesn't sleep.</h1>
  <p>Real-time prices for the top coins by market cap, pulled straight from CoinGecko. No sign-up, no noise — just the numbers.</p>
</header>

<main>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Filter by name or symbol...">
    <div class="updated mono" id="updated">Loading...</div>
  </div>

  <div id="content">
    <div class="loading">Fetching live prices...</div>
  </div>
</main>

<footer>
  Prices via CoinGecko API · Auto-refreshes every 60s · Built by Cryptobey
</footer>

<script>
  const API = "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1&sparkline=false&price_change_percentage=24h";
  let coins = [];

  function fmtPrice(n) {
    if (n >= 1) return n.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
    return '$' + n.toPrecision(4);
  }

  function fmtCompact(n) {
    return '$' + Intl.NumberFormat('en-US', { notation: 'compact', maximumFractionDigits: 2 }).format(n);
  }

  function renderTape() {
    const tapeEl = document.getElementById('tape');
    const items = coins.slice(0, 12).map(c => {
      const cls = c.price_change_percentage_24h >= 0 ? 'up' : 'down';
      const arrow = c.price_change_percentage_24h >= 0 ? '▲' : '▼';
      return `<span class="${cls}"><b>${c.symbol.toUpperCase()}</b> ${fmtPrice(c.current_price)} ${arrow} ${Math.abs(c.price_change_percentage_24h || 0).toFixed(2)}%</span>`;
    }).join('');
    tapeEl.innerHTML = items + items; // duplicate for seamless loop
  }

  function renderTable(filter = '') {
    const content = document.getElementById('content');
    const f = filter.trim().toLowerCase();
    const rows = coins.filter(c =>
      c.name.toLowerCase().includes(f) || c.symbol.toLowerCase().includes(f)
    );

    if (rows.length === 0) {
      content.innerHTML = '<div class="loading">No coins match that filter.</div>';
      return;
    }

    const html = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Coin</th>
            <th class="num">Price</th>
            <th class="num">24h</th>
            <th class="num">Market Cap</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(c => {
            const change = c.price_change_percentage_24h || 0;
            const cls = change >= 0 ? 'up' : 'down';
            const sign = change >= 0 ? '+' : '';
            return `
              <tr>
                <td class="mono" style="color:var(--dim)">${c.market_cap_rank}</td>
                <td>
                  <div class="coin-name">
                    <img src="${c.image}" alt="${c.name}">
                    <div>
                      <div>${c.name}</div>
                      <div class="coin-symbol">${c.symbol}</div>
                    </div>
                  </div>
                </td>
                <td class="num">${fmtPrice(c.current_price)}</td>
                <td class="num ${cls}">${sign}${change.toFixed(2)}%</td>
                <td class="num" style="color:var(--dim)">${fmtCompact(c.market_cap)}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
    content.innerHTML = html;
  }

  async function fetchPrices() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error('API error');
      coins = await res.json();
      renderTape();
      renderTable(document.getElementById('search').value);
      document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch (err) {
      document.getElementById('content').innerHTML = '<div class="error">Couldn\'t load prices. CoinGecko may be rate-limiting — try again shortly.</div>';
      document.getElementById('updated').textContent = 'Update failed';
    }
  }

  document.getElementById('search').addEventListener('input', (e) => {
    renderTable(e.target.value);
  });

  fetchPrices();
  setInterval(fetchPrices, 60000);
</script>

</body>
</html>
